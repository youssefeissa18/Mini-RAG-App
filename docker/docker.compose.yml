services:
  mongodb:
    image: mongo:7.0-jammy
    container_name: mongodb
    ports:
      - "27007:27017"
    volumes:
      - mongodbdata:/data/db
    
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}

    networks:
      - backend
    restart: always

networks:
  backend:
    driver: bridge

volumes:
  mongodbdata: